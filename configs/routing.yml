# AI Tutor — Routing & Model Configuration
# Determines which model serves each teacher agent based on subject requirements
# Model: nvidia/Qwen3-Next-80B-A3B-Instruct-NVFP4 via Avarok Docker on GX10
# Speed: ~42 tok/s (Marlin), ~67 tok/s (with MTP speculative decoding)

routing:
  default_backend: gx10
  default_model: "qwen3-next-80b-a3b"

  agents:
    math-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      thinking_mode: true
      context_length: 32768
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      fallback_backend: desktop
      fallback_model: "qwen3.5-claude-4.6-opus-q4:9b"
      reason: "80B MoE with deep reasoning for proofs and competition math"

    science-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      thinking_mode: true
      context_length: 32768
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      fallback_backend: desktop
      fallback_model: "qwen3.5-claude-4.6-opus-q4:9b"
      reason: "Physics/chemistry derivations need step-by-step reasoning"

    english-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      thinking_mode: true
      context_length: 32768
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      fallback_backend: desktop
      fallback_model: "qwen3.5-claude-4.6-opus-q4:9b"
      reason: "80B gives superior writing analysis and rhetorical feedback"

    chinese-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      thinking_mode: true
      context_length: 32768
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      fallback_backend: minillm
      fallback_model: "qwen3-vl-4b"
      reason: "Qwen-based model with native Chinese strength, now with reasoning"

    history-teacher:
      backend: gx10
      model: "qwen3-next-80b-a3b"
      thinking_mode: true
      context_length: 32768
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      fallback_backend: minillm
      fallback_model: "qwen3-vl-4b"
      reason: "80B enables deeper source analysis and essay reasoning"

# ── Concurrent Load Estimate ────────────────────────────────────────────────
# Single model (Qwen3-Next-80B-A3B-NVFP4) serves all agents.
# 80B total params, 3B active per token (512 experts, top-10 MoE)
# NVFP4 weights: ~20 GB in memory
# At most 1 teacher + 1 coder concurrent.
#
# Scenario: teacher (32K ctx) + coder (32K ctx) concurrent:
#   NVFP4 weights: ~20 GB (shared, single model)
#   KV cache (2 concurrent, 32K each, fp8): ~8 GB
#   Total: ~28 GB — well within 128 GB unified memory
