# ── Progress Tracking ──────────────────────────────────────────────────────
tracking:
  metrics:
    - accuracy_rate        # % correct on practice problems
    - time_per_problem     # seconds (for timed exams)
    - essay_score          # AP rubric (1-6) or IB criteria
    - character_count      # Chinese: cumulative characters learned
    - streak_days          # consecutive study days

  thresholds:
    slow_down: 0.60        # accuracy < 60% → revisit prerequisites
    on_track: 0.80         # 60-80% → continue current pace
    advance: 0.90          # > 90% → move to next topic or increase difficulty
